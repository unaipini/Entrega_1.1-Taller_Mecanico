<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Uso de Máquina</title>
    <style>
      .navbar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            padding: 10px;
        }

        .navbar a {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: bold;
            background-color: #2c3e50;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .navbar a:hover {
            background-color: #34495e;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .navbar a.activo {
            background-color: #3498db;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transform: scale(1.05);
        }

        .navbar a.activo:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/historial.html">Historial</a>
    <a href="/lista.html">Lista</a>
    <a href="/uso.html" class="activo">Uso</a>
    <a href="/registrar.html">Registro</a>
    <a href="/graficos.html">Graficos</a>
</div>

<h1>▶ Iniciar / Finalizar Uso</h1>

<label>Usuario:</label>
<select id="usuario"></select>

<label>Máquina:</label>
<select id="maquina"></select>

<button onclick="iniciar()">Iniciar Uso</button>
<button onclick="finalizar()">Finalizar Uso</button>

<hr>

<h2>📝 Registrar Evento</h2>

<textarea id="descripcionEvento" placeholder="Describe el evento..."></textarea>
<br><br>
<button onclick="registrarEvento()">Registrar Evento</button>

<p id="mensaje"></p>

<script>
const selectUsuario = document.getElementById('usuario');
const selectMaquina = document.getElementById('maquina');
const mensaje = document.getElementById('mensaje');

fetch('/api/usuarios')
  .then(res => res.json())
  .then(data => {
    data.data.forEach(u => {
      const option = document.createElement('option');
      option.value = u.id;
      option.textContent = u.nombre;
      selectUsuario.appendChild(option);
    });
  });

fetch('/api/maquinas')
  .then(res => res.json())
  .then(data => {
    data.data.forEach(m => {
      const option = document.createElement('option');
      option.value = m.id;
      option.textContent = m.nombre;
      selectMaquina.appendChild(option);
    });
  });

function iniciar() {
  fetch('/api/uso/iniciar', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      id_maquina: selectMaquina.value,
      id_usuario: selectUsuario.value
    })
  })
  .then(res => res.json())
  .then(data => mensaje.textContent = data.mensaje);
}

function finalizar() {
  fetch('/api/uso/finalizar', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      id_maquina: selectMaquina.value
    })
  })
  .then(res => res.json())
  .then(data => mensaje.textContent = data.mensaje);
}

function registrarEvento() {

  const descripcion = document.getElementById('descripcionEvento').value;

  fetch('/api/eventos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      id_maquina: selectMaquina.value,
      id_usuario: selectUsuario.value,
      descripcion: descripcion
    })
  })
  .then(res => res.json())
  .then(data => {
    mensaje.textContent = data.mensaje;
    document.getElementById('descripcionEvento').value = '';
  });
}
</script>

</body>
</html>
