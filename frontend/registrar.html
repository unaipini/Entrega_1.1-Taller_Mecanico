<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Incidencia</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f8; margin: 20px; color: #333;}
        h1 { text-align: center; color: #2c3e50;}
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        select, textarea { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px;}
        textarea { resize: vertical; min-height: 100px; }
        button { margin-top: 25px; width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;}
        button:hover { background-color: #1a252f; }
        .mensaje { margin-top: 15px; font-weight: bold; text-align: center; }
        .ok { color: green; }
        .error { color: red; }

        /* Navbar unificado */
        .navbar { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; padding: 10px; }
        .navbar a { text-decoration: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; background-color: #2c3e50; color: white; transition: all 0.3s ease; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .navbar a:hover { background-color: #34495e; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        .navbar a.activo { background-color: #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/historial.html">Historial</a>
        <a href="/lista.html">Lista</a>
        <a href="/uso.html">Uso</a>
        <a href="/registrar.html" class="activo">Registro</a>
        <a href="/graficos.html">Gráficos</a>
        <a href="/plazos.html">Plazos</a>
    </div>

    <h1>🛠 Registrar Nueva Incidencia</h1>

    <div class="container">
        <form id="formIncidencia">
            <label for="usuario">¿Quién registra la incidencia?</label>
            <select id="usuario"></select>

            <label for="maquina">Seleccionar máquina:</label>
            <select id="maquina"></select>

            <label for="descripcion">Descripción del problema:</label>
            <textarea id="descripcion" placeholder="Describe el fallo (mínimo 10 caracteres)..."></textarea>

            <button type="submit">Registrar Incidencia</button>
        </form>
        <div id="mensaje" class="mensaje"></div>
    </div>

    <script>
        const selectUsuario = document.getElementById('usuario');
        const selectMaquina = document.getElementById('maquina');
        const form = document.getElementById('formIncidencia');
        const mensaje = document.getElementById('mensaje');

        fetch('/api/usuarios').then(res => res.json()).then(data => {
            const optionDefault = document.createElement('option');
            optionDefault.value = ""; optionDefault.textContent = "-- Selecciona tu usuario --";
            selectUsuario.appendChild(optionDefault);
            data.data.forEach(u => {
                const option = document.createElement('option');
                option.value = u.id; option.textContent = u.nombre + " (" + u.rol + ")";
                selectUsuario.appendChild(option);
            });
        });

        fetch('/api/maquinas').then(res => res.json()).then(data => {
            const optionDefault = document.createElement('option');
            optionDefault.value = ""; optionDefault.textContent = "-- Selecciona una máquina --";
            selectMaquina.appendChild(optionDefault);
            data.data.forEach(maquina => {
                const option = document.createElement('option');
                option.value = maquina.id; option.textContent = maquina.nombre + " (" + maquina.tipo + ")";
                selectMaquina.appendChild(option);
            });
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const id_usuario = selectUsuario.value;
            const id_maquina = selectMaquina.value;
            const descripcion = document.getElementById('descripcion').value.trim();

            if (!id_usuario) { mensaje.textContent = "Error: Debes seleccionar tu usuario."; mensaje.className = 'mensaje error'; return; }
            if (!id_maquina) { mensaje.textContent = "Error: Debes seleccionar una máquina."; mensaje.className = 'mensaje error'; return; }
            if (descripcion.length < 10) { mensaje.textContent = "Error: La descripción debe tener al menos 10 caracteres."; mensaje.className = 'mensaje error'; return; }

            fetch('/api/incidencias', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id_usuario, id_maquina, descripcion })
            })
            .then(res => res.json().then(data => ({ status: res.status, body: data })))
            .then(response => {
                if (response.status === 201) {
                    mensaje.textContent = response.body.mensaje;
                    mensaje.className = 'mensaje ok';
                    form.reset();
                } else {
                    mensaje.textContent = response.body.mensaje;
                    mensaje.className = 'mensaje error';
                }
            })
            .catch(() => { mensaje.textContent = "Error de conexión con el servidor."; mensaje.className = 'mensaje error'; });
        });
    </script>
</body>
</html>
