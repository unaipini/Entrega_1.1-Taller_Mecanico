<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Máquina</title>
    <style>
        .navbar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            padding: 10px;
        }

        .navbar a {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: bold;
            background-color: #2c3e50;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .navbar a:hover {
            background-color: #34495e;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .navbar a.activo {
            background-color: #3498db;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transform: scale(1.05);
        }

        .navbar a.activo:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
<div class="navbar">
    <a href="/historial.html" class="activo">Historial</a>
    <a href="/lista.html">Lista</a>
    <a href="/uso.html">Uso</a>
    <a href="/registrar.html">Registro</a>
    <a href="/graficos.html">Graficos</a>

</div>

<h1>📊 Historial de Máquina</h1>

<label>Seleccionar máquina:</label>
<select id="maquina"></select>

<button onclick="cargarHistorial()">Ver Historial</button>

<h2>👷 Historial de Uso</h2>
<table border="1">
    <thead>
        <tr>
            <th>Usuario</th>
            <th>Inicio</th>
            <th>Fin</th>
        </tr>
    </thead>
    <tbody id="tablaUsos"></tbody>
</table>

<h2>🛠 Incidencias</h2>
<table border="1">
    <thead>
        <tr>
            <th>Descripción</th>
            <th>Estado</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody id="tablaIncidencias"></tbody>
</table>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const selectMaquina = document.getElementById('maquina');

    fetch('/api/maquinas')
        .then(res => res.json())
        .then(data => {
            data.data.forEach(m => {
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = m.nombre;
                selectMaquina.appendChild(option);
            });
        });
});

function cargarHistorial() {

    const id = document.getElementById('maquina').value;

    fetch(`/api/maquinas/${id}/historial`)
        .then(res => res.json())
        .then(response => {

            const tablaUsos = document.getElementById('tablaUsos');
            const tablaIncidencias = document.getElementById('tablaIncidencias');

            tablaUsos.innerHTML = '';
            tablaIncidencias.innerHTML = '';

            // Pintar usos
            response.data.usos.forEach(uso => {
                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td>${uso.nombre}</td>
                    <td>${uso.fecha_inicio}</td>
                    <td>${uso.fecha_fin || 'En uso'}</td>
                `;
                tablaUsos.appendChild(fila);
            });

            // Pintar incidencias
            response.data.incidencias.forEach(inc => {
                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td>${inc.descripcion}</td>
                    <td>${inc.estado}</td>
                    <td>${inc.fecha}</td>
                `;
                tablaIncidencias.appendChild(fila);
            });

        });
}
</script>

</body>
</html>
