<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plazos de resolución</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f8;
margin:20px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#2c3e50;
color:white;
}

tr:hover{
background:#f1f1f1;
}

.navbar{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:25px;
}

.navbar a{
text-decoration:none;
padding:10px 18px;
border-radius:6px;
font-weight:bold;
background:#2c3e50;
color:white;
}

.navbar a.activo{
background:#3498db;
}

</style>

</head>

<body>

<div class="navbar">
<a href="/historial.html">Historial</a>
<a href="/lista.html">Lista</a>
<a href="/uso.html">Uso</a>
<a href="/registrar.html">Registro</a>
<a href="/graficos.html">Graficos</a>
<a href="/plazos.html" class="activo">Plazos</a>
</div>

<h1>⏱ Plazos de resolución de incidencias</h1>

<table id="tablaPlazos">

<thead>
<tr>
<th>ID</th>
<th>Descripción</th>
<th>Inicio</th>
<th>Fin</th>
<th>Horas resolución</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

fetch('/api/incidencias/tiempos')
.then(res=>res.json())
.then(data=>{

const tabla=document.querySelector("#tablaPlazos tbody");

data.data.forEach(inc=>{

const fila=document.createElement("tr");

fila.innerHTML=`
<td>${inc.id}</td>
<td>${inc.descripcion}</td>
<td>${inc.fecha}</td>
<td>${inc.fecha_fin}</td>
<td>${inc.horas_resolucion}</td>
`;

tabla.appendChild(fila);

});

});

</script>

</body>
</html>
