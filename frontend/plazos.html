<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plazos de resolución</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f8; margin: 20px; color: #333; }
        h1 { text-align: center; color: #2c3e50; }
        
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f1f1f1; }

        /* Navbar unificado */
        .navbar { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; padding: 10px; }
        .navbar a { text-decoration: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; background-color: #2c3e50; color: white; transition: all 0.3s ease; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .navbar a:hover { background-color: #34495e; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        .navbar a.activo { background-color: #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/historial.html">Historial</a>
        <a href="/lista.html">Lista</a>
        <a href="/uso.html">Uso</a>
        <a href="/registrar.html">Registro</a>
        <a href="/graficos.html">Gráficos</a>
        <a href="/plazos.html" class="activo">Plazos</a>
    </div>

    <h1>⏱ Plazos de resolución de incidencias</h1>

    <div class="container">
        <table id="tablaPlazos">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Descripción</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Horas resolución</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        fetch('/api/incidencias/tiempos')
        .then(res => res.json())
        .then(data => {
            const tabla = document.querySelector("#tablaPlazos tbody");
            data.data.forEach(inc => {
                const fila = document.createElement("tr");
                fila.innerHTML = `
                    <td>${inc.id}</td>
                    <td>${inc.descripcion}</td>
                    <td>${inc.fecha}</td>
                    <td>${inc.fecha_fin}</td>
                    <td><strong>${inc.horas_resolucion} h</strong></td>
                `;
                tabla.appendChild(fila);
            });
        });
    </script>
</body>
</html>
