<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Métricas e Incidencias</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f8; margin: 20px; color: #333; }
        h1 { text-align: center; color: #2c3e50; }
        .dashboard { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: 30px; max-width: 1200px; margin-left: auto; margin-right: auto;}
        .card-grafico { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 45%; min-width: 300px; }
        canvas { max-width: 100%; }
        
        /* Navbar unificado */
        .navbar { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; padding: 10px; }
        .navbar a { text-decoration: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; background-color: #2c3e50; color: white; transition: all 0.3s ease; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .navbar a:hover { background-color: #34495e; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        .navbar a.activo { background-color: #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/historial.html">Historial</a>
        <a href="/lista.html">Lista</a>
        <a href="/uso.html">Uso</a>
        <a href="/registrar.html">Registro</a>
        <a href="/graficos.html" class="activo">Gráficos</a>
        <a href="/plazos.html">Plazos</a>
    </div>

    <h1>📊 Dashboard de Métricas</h1>

    <div class="dashboard">
        <div class="card-grafico">
            <h3 style="text-align: center; color: #2c3e50;">Estado de las Incidencias</h3>
            <canvas id="graficoEstado"></canvas>
        </div>

        <div class="card-grafico">
            <h3 style="text-align: center; color: #2c3e50;">Incidencias por Máquina</h3>
            <canvas id="graficoMaquinas"></canvas>
        </div>
    </div>

<script>
    fetch('/api/metricas')
        .then(res => res.json())
        .then(response => {
            const datos = response.data;
            const ctxEstado = document.getElementById('graficoEstado').getContext('2d');
            const labelsEstado = datos.porEstado.map(d => d.estado);
            const valuesEstado = datos.porEstado.map(d => d.total);

            new Chart(ctxEstado, {
                type: 'doughnut',
                data: {
                    labels: labelsEstado,
                    datasets: [{
                        data: valuesEstado,
                        backgroundColor: ['#e74c3c', '#f39c12', '#2ecc71'], 
                    }]
                }
            });

            const ctxMaquinas = document.getElementById('graficoMaquinas').getContext('2d');
            const labelsMaquinas = datos.porMaquina.map(d => d.nombre);
            const valuesMaquinas = datos.porMaquina.map(d => d.total);

            new Chart(ctxMaquinas, {
                type: 'bar',
                data: {
                    labels: labelsMaquinas,
                    datasets: [{
                        label: 'Nº de Incidencias',
                        data: valuesMaquinas,
                        backgroundColor: '#3498db'
                    }]
                },
                options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });
        })
        .catch(error => console.error("Error cargando métricas:", error));
</script>

</body>
</html>
