<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Incidencias</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f8; margin: 20px; color: #333; }
        h1 { text-align: center; color: #2c3e50; }
        
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f1f1f1; }
        select { padding: 6px; border-radius: 4px; border: 1px solid #ccc; width: 100%; font-size: 14px; }

        .toast { position: fixed; bottom: 20px; right: 20px; background: #2ecc71; color: white; padding: 12px 18px; border-radius: 6px; font-weight: bold; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Navbar unificado */
        .navbar { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; padding: 10px; }
        .navbar a { text-decoration: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; background-color: #2c3e50; color: white; transition: all 0.3s ease; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .navbar a:hover { background-color: #34495e; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        .navbar a.activo { background-color: #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/historial.html">Historial</a>
        <a href="/lista.html" class="activo">Lista</a>
        <a href="/uso.html">Uso</a>
        <a href="/registrar.html">Registro</a>
        <a href="/graficos.html">Gráficos</a>
        <a href="/plazos.html">Plazos</a>
    </div>

    <h1>📋 Gestión de Incidencias</h1>

    <div class="container">
        <table id="tablaIncidencias">
            <thead>
                <tr>
                    <th>Máquina</th>
                    <th>Tipo</th>
                    <th>Descripción</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Registrado por</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        function cargarIncidencias() {
            fetch('/api/incidencias/abiertas')
                .then(response => response.json())
                .then(data => {
                    const tabla = document.querySelector('#tablaIncidencias tbody');
                    tabla.innerHTML = '';
                    data.data.forEach(inc => {
                        const fila = document.createElement('tr');
                        fila.innerHTML = `
                            <td>${inc.maquina_nombre}</td>
                            <td>${inc.maquina_tipo}</td>
                            <td>${inc.descripcion}</td>
                            <td>
                                <select onchange="cambiarEstado(${inc.incidencia_id}, this.value)">
                                    <option value="Abierta" ${inc.estado === 'Abierta' ? 'selected' : ''}>Abierta</option>
                                    <option value="En Progreso" ${inc.estado === 'En Progreso' ? 'selected' : ''}>En Progreso</option>
                                    ${rolUsuario === "Supervisor" ? '<option value="Cerrada">Cerrada</option>' : ''}
                                </select>
                            </td>
                            <td>${inc.fecha}</td>
                            <td>${inc.registrado_por}</td>
                        `;
                        tabla.appendChild(fila);
                    });
                })
                .catch(error => console.error('Error cargando incidencias:', error));
        }

        let usuarioActual = 2; // Simulación: 2 = Supervisor
        let rolUsuario = "Supervisor";

        function cambiarEstado(id, nuevoEstado) {
            fetch(`/api/incidencias/${id}/estado`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ estado: nuevoEstado, id_usuario: usuarioActual })
            })
            .then(res => res.json())
            .then(data => {
                mostrarToast(data.mensaje);
                setTimeout(() => { cargarIncidencias(); }, 500);
            })
            .catch(error => console.error(error));
        }

        function mostrarToast(mensaje) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = mensaje;
            document.body.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }

        cargarIncidencias();
    </script>
</body>
</html>
